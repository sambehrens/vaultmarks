name: Server

on:
  push:
    branches: [main]
    paths: ["server/**"]
  pull_request:
    paths: ["server/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - run: cargo build --release
      - run: cargo test
