<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis Sync</title>
<style>
      @font-face {
        font-family: 'IBM Plex Sans';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/ibm-plex-sans-400.woff2') format('woff2');
      }
      @font-face {
        font-family: 'IBM Plex Sans';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/ibm-plex-sans-500.woff2') format('woff2');
      }
      @font-face {
        font-family: 'IBM Plex Sans';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('/fonts/ibm-plex-sans-600.woff2') format('woff2');
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/ibm-plex-mono-500.woff2') format('woff2');
      }

      :root {
        --bg: #0c0e14;
        --surface: #12151e;
        --surface-raised: #181c28;
        --border: #2a3050;
        --border-hover: #3a4468;
        --accent: #4ade80;
        --accent-dim: rgba(74, 222, 128, 0.08);
        --accent-glow: rgba(74, 222, 128, 0.14);
        --accent-text: #051208;
        --text-primary: #ccd6f6;
        --text-secondary: #8896b3;
        --danger: #f87171;
        --danger-dim: rgba(248, 113, 113, 0.09);
        --danger-border: rgba(248, 113, 113, 0.28);
        --success: #4ade80;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f6f8;
          --surface: #ffffff;
          --surface-raised: #eef0f5;
          --border: #d8dce8;
          --border-hover: #b0b8cc;
          --accent: #16a34a;
          --accent-dim: rgba(22, 163, 74, 0.08);
          --accent-glow: rgba(22, 163, 74, 0.18);
          --accent-text: #ffffff;
          --text-primary: #111827;
          --text-secondary: #4b5563;
          --danger: #dc2626;
          --danger-dim: rgba(220, 38, 38, 0.07);
          --danger-border: rgba(220, 38, 38, 0.25);
          --success: #16a34a;
        }
      }

      /* Explicit theme overrides — higher specificity than media query */
      html.light {
        --bg: #f5f6f8;
        --surface: #ffffff;
        --surface-raised: #eef0f5;
        --border: #d8dce8;
        --border-hover: #b0b8cc;
        --accent: #16a34a;
        --accent-dim: rgba(22, 163, 74, 0.08);
        --accent-glow: rgba(22, 163, 74, 0.18);
        --accent-text: #ffffff;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --danger: #dc2626;
        --danger-dim: rgba(220, 38, 38, 0.07);
        --danger-border: rgba(220, 38, 38, 0.25);
        --success: #16a34a;
      }

      html.dark {
        --bg: #0c0e14;
        --surface: #12151e;
        --surface-raised: #181c28;
        --border: #2a3050;
        --border-hover: #3a4468;
        --accent: #4ade80;
        --accent-dim: rgba(74, 222, 128, 0.08);
        --accent-glow: rgba(74, 222, 128, 0.14);
        --accent-text: #051208;
        --text-primary: #ccd6f6;
        --text-secondary: #8896b3;
        --danger: #f87171;
        --danger-dim: rgba(248, 113, 113, 0.09);
        --danger-border: rgba(248, 113, 113, 0.28);
        --success: #4ade80;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { font-size: 62.5%; }

      body {
        width: 300px;
        min-height: 200px;
        font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 1.4rem;
        color: var(--text-primary);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }

      input, select, button, textarea {
        font-family: inherit;
        font-size: inherit;
      }

      input:focus, select:focus {
        outline: none;
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      input::placeholder { color: var(--text-secondary); opacity: 1; }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .btn-icon {
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        border-radius: 5px;
        transition: background 0.15s, color 0.15s;
      }
      .btn-icon:hover { background: var(--surface-raised); color: var(--text-primary); }

      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .btn-icon--spinning { animation: spin 0.7s linear infinite; }

      .btn-ghost { transition: background 0.15s, border-color 0.15s, color 0.15s; }
      .btn-ghost:hover {
        background: var(--surface-raised) !important;
        border-color: var(--border-hover) !important;
        color: var(--text-primary) !important;
      }

      .btn-text-link { transition: color 0.15s, opacity 0.15s; }
      .btn-text-link:hover { color: var(--accent) !important; opacity: 1 !important; }

      .btn-profile { transition: background 0.15s, border-color 0.15s; font-family: inherit; }
      .btn-profile:not(.btn-profile--active):hover {
        background: var(--surface-raised) !important;
        border-color: var(--border-hover) !important;
      }

      .btn-appearance { transition: background 0.15s, color 0.15s; }
      .btn-appearance:not(.btn-appearance--active):hover {
        background: var(--surface-raised) !important;
      }

      .btn-action-icon {
        background: none;
        border: 1px solid var(--border);
        border-radius: 5px;
        cursor: pointer;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        padding: 0;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .btn-action-icon:hover:not(:disabled) {
        background: var(--surface-raised);
        border-color: var(--border-hover);
        color: var(--text-primary);
      }
      .btn-action-icon:disabled { opacity: 0.2; cursor: default; }
      .btn-action-icon--danger { color: var(--danger); }
      .btn-action-icon--danger.btn-action-icon--confirming {
        border-color: var(--danger-border);
        background: var(--danger-dim);
      }
      .btn-action-icon--danger:hover:not(:disabled) {
        background: var(--danger-dim);
        border-color: var(--danger-border);
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/popup/index.tsx"></script>
  </body>
</html>
